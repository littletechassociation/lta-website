<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Little Tech Association</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --petrol:  #07313F;
    --paper:   #F7F5F2;
    --orange:  #CC4812;
    --vibrant: #EF5E1C;
    --blue:    #6B8FF0;
    --paper60: rgba(247, 245, 242, 0.60);
    --paper72: rgba(247, 245, 242, 0.72);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--petrol);
    color: var(--paper);
    font-family: 'Figtree', sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ============ TOP BAR ============ */
  .topbar {
    position: fixed;
    top: clamp(28px, 4vw, 44px);
    left: clamp(40px, 6vw, 88px);
    right: clamp(40px, 6vw, 88px);
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-family: 'Figtree', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.01em;
    color: var(--paper);
  }
  .nav { display: flex; gap: clamp(20px, 2.6vw, 36px); }
  .nav a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 1px;
    color: var(--paper72);
    text-decoration: none;
    transition: color .25s;
  }
  .nav a:hover { color: var(--paper); }

  /* ============ STAGE — everything pinned ============ */
  .stage {
    position: fixed; inset: 0;
    padding: 0 clamp(40px, 6vw, 88px);
  }

  /* Hero pinned at a fixed vertical position so the static line never moves */
  .hero {
    position: absolute;
    top: 30%;
    left: clamp(40px, 6vw, 88px);
    right: clamp(40px, 6vw, 88px);
    max-width: 1080px;
  }
  .headline {
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
    font-size: clamp(30px, 4.4vw, 54px);
    line-height: 1.14;
    letter-spacing: -0.012em;
    color: var(--paper);
    margin: 0;
    /* Reserve room for up to 3 lines so Learn More below never shifts when a
       long phrase pushes the hero to a third line. 3 × 1.14em line-height. */
    min-height: 3.42em;
  }
  /* The animated portion lives inline, right after the em-dash, so the
     sentence reads straight through. */
  .change-slot { color: var(--vibrant); }
  .change-slot .dash { color: var(--paper); }
  .change-slot .typed { color: var(--vibrant); }
  .caret {
    display: inline-block;
    width: 0.06em;
    min-width: 3px;
    background: var(--vibrant);
    margin-left: 0.04em;
    animation: blink 1s steps(1) infinite;
    vertical-align: baseline;
    /* match the cap height of the type */
    height: 0.82em;
    transform: translateY(0.06em);
  }
  @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }

  /* Join zone — always on, centered in the lower third. Tagline stacked above button. */
  .join-zone {
    position: absolute;
    left: 0; right: 0;
    bottom: 0; height: 33.333%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 22px;
    pointer-events: none;
  }
  /* White tagline above the button — smaller than the hero, larger than body text. */
  .join-tagline {
    margin: 0;
    font-family: 'Figtree', sans-serif;
    font-weight: 500;
    font-size: clamp(18px, 2vw, 22px);
    letter-spacing: 0.005em;
    color: var(--paper);
    text-align: center;
  }
  .join-btn {
    pointer-events: auto;
    font-family: 'Figtree', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.01em;
    color: var(--petrol);
    background: var(--vibrant);
    padding: 17px 52px;
    border-radius: 5px;
    text-decoration: none;
    transition: background .2s ease, transform .2s ease;
  }
  .join-btn:hover { background: #ff6a26; transform: translateY(-1px); }
  .join-btn:active { transform: translateY(0) scale(0.99); }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">Little Tech Association</div>
    <nav class="nav">
      <a href="#">Mission &amp; Issues</a>
      <a href="#">Why Actual?</a>
      <a href="#">Join Us</a>
    </nav>
  </div>

  <div class="stage">
    <div class="hero">
      <p class="headline">The actual voice of founders, start-ups, and digital innovators<span class="change-slot" id="slot"></span></p>
    </div>

    <div class="join-zone">
      <p class="join-tagline">Together, let's build something great:</p>
      <a class="join-btn" href="#">Join Us</a>
    </div>
  </div>

<script>
(function(){
  var phrases = [
    "defending free markets.",
    "empowering builders.",
    "freeing consumers.",
    "keeping AI competitive.",
    "advancing open systems."
  ];
  var slot = document.getElementById('slot');
  if (!slot) return;

  var typeSpeed = 42;     // ms per character
  var holdTime  = 1900;   // pause after a phrase finishes typing
  var dash = ' \u2014 ';  // " — "
  var typeTimer, cycleTimer;

  function typePhrase(phrase, done) {
    slot.innerHTML = '';
    var dashEl = document.createElement('span'); dashEl.className = 'dash'; dashEl.textContent = dash;
    var txt    = document.createElement('span'); txt.className = 'typed';
    var caret  = document.createElement('span'); caret.className = 'caret';
    slot.appendChild(dashEl);
    slot.appendChild(txt);
    slot.appendChild(caret);
    var i = 0;
    (function step(){
      if (i <= phrase.length) {
        txt.textContent = phrase.slice(0, i);
        i++;
        typeTimer = setTimeout(step, typeSpeed);
      } else {
        done();   // leave caret blinking at the end of the phrase
      }
    })();
  }

  var idx = 0;
  function cycle() {
    typePhrase(phrases[idx], function(){
      cycleTimer = setTimeout(function(){
        idx = (idx + 1) % phrases.length;
        cycle();
      }, holdTime);
    });
  }

  // Start with a brief blinking caret right after the static line, then type.
  slot.innerHTML = '<span class="dash">' + dash + '</span><span class="caret"></span>';
  setTimeout(cycle, 800);
})();
</script>
</body>
</html>
